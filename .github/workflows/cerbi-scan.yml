name: Cerbi Scanner

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  cerbi-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      CERBI_FAIL_ON: high
      CERBI_SCANNER_PACKAGE: ${{ vars.CERBI_SCANNER_PACKAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build samples
        run: |
          dotnet build src/dotnet/UnsafeApi/UnsafeApi.csproj --configuration Release
          dotnet build src/dotnet/SafeApi/SafeApi.csproj --configuration Release

      - name: Install or update Cerbi Scanner
        shell: bash
        run: |
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          export PATH="$PATH:$HOME/.dotnet/tools"
          package_id="${CERBI_SCANNER_PACKAGE:-Cerbi.Scanner}"
          if dotnet tool list --global | awk 'NR > 2 { print $1 }' | grep -Fxq "$(printf '%s' "$package_id" | tr '[:upper:]' '[:lower:]')"; then
            dotnet tool update --global "$package_id"
          else
            dotnet tool install --global "$package_id"
          fi
          cerbi-scanner --help
          cerbi-scanner audit --help

      - name: Run Cerbi Scanner
        run: |
          mkdir -p scan-results
          cerbi-scanner audit . \
            --profile policies/cerbi_governance.json \
            --fail-on "$CERBI_FAIL_ON" \
            --format json \
            --output scan-results/findings.json \
            --snippets
          cerbi-scanner audit . \
            --profile policies/cerbi_governance.json \
            --fail-on "$CERBI_FAIL_ON" \
            --format sarif \
            --output scan-results/findings.sarif \
            --snippets
          cerbi-scanner audit . \
            --profile policies/cerbi_governance.json \
            --fail-on "$CERBI_FAIL_ON" \
            --format html \
            --output scan-results/findings.html \
            --snippets

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerbi-scan-results
          path: scan-results/

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('scan-results/findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results/findings.sarif
