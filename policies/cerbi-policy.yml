# Future policy-as-code example only. The current public Cerbi Scanner CLI uses the JSON governance profile at policies/cerbi_governance.json.
# Do not pass this YAML file to `cerbi-scanner audit --profile` unless a future scanner release explicitly supports it.
version: 1
failOn: error

requiredFields:
  # These fields make log events traceable and queryable across services and environments.
  - service
  - environment
  - correlationId
  - eventName

disallowedFields:
  # Credentials and secrets must never be emitted to logs.
  - password
  - token
  - accessToken
  - refreshToken
  - authorization
  # Regulated personal and payment data should be blocked or masked before logging.
  - ssn
  - creditCard
  - cardNumber
  # Raw request data frequently contains unreviewed sensitive data and schema drift.
  - rawBody
  - payload

highCardinalityWarnings:
  # These fields can create cost and index pressure when used as primary dimensions.
  # Prefer correlationId for tracing and stable categories for dashboards.
  - userId
  - sessionId
  - customerId
  - requestId

rules:
  CERBI001:
    description: Sensitive personal data in structured log fields.
    severity: error
  CERBI002:
    description: Credential, bearer token, or authorization value logged.
    severity: error
  CERBI003:
    description: Raw request body or payload dump logged.
    severity: error
  CERBI004:
    description: Risky object destructuring may leak nested sensitive fields.
    severity: warning
  CERBI005:
    description: Missing required governance fields.
    severity: warning
  CERBI006:
    description: High-cardinality identifiers used as log dimensions.
    severity: warning
