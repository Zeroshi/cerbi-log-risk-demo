# Copy this file into an Azure DevOps pipeline and update scanner installation for your Cerbi distribution.
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  CerbiFailOn: error
  CerbiPolicyPath: policies/cerbi-policy.yml
  CerbiScanPath: .
  CerbiScannerPackage: Cerbi.Scanner

steps:
  - checkout: self

  - task: UseDotNet@2
    displayName: Use .NET 10 SDK
    inputs:
      packageType: sdk
      version: 10.0.x

  - script: |
      dotnet build src/dotnet/UnsafeApi/UnsafeApi.csproj --configuration Release
      dotnet build src/dotnet/SafeApi/SafeApi.csproj --configuration Release
    displayName: Build demo APIs

  # If your organization uses the Cerbi Scanner Azure DevOps extension, replace the CLI step below with that task.
  # Example inputs to map: scanPath, policyPath, failOn, sarifOutput, jsonOutput, markdownSummary.
  - script: |
      export PATH="$PATH:$HOME/.dotnet/tools"
      if dotnet tool list --global | awk 'NR > 2 { print $1 }' | grep -Fxq "$(printf '%s' "$(CerbiScannerPackage)" | tr '[:upper:]' '[:lower:]')"; then
        dotnet tool update --global "$(CerbiScannerPackage)"
      else
        dotnet tool install --global "$(CerbiScannerPackage)"
      fi
      cerbi-scanner --help
      mkdir -p $(Build.ArtifactStagingDirectory)/cerbi
      cerbi-scanner scan \
        --path "$(CerbiScanPath)" \
        --policy "$(CerbiPolicyPath)" \
        --fail-on "$(CerbiFailOn)" \
        --format json --output "$(Build.ArtifactStagingDirectory)/cerbi/findings.json" \
        --sarif "$(Build.ArtifactStagingDirectory)/cerbi/findings.sarif" \
        --summary "$(Build.ArtifactStagingDirectory)/cerbi/build-summary.md"
    displayName: Install and run Cerbi Scanner

  - publish: $(Build.ArtifactStagingDirectory)/cerbi
    artifact: cerbi-scan-results
    condition: always()
